version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: ./Docker/local/python/Dockerfile
    volumes:
      - .:/app:z
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    expose:
      - "8000"
    env_file:
      - ./.envs/.local/.postgres
    depends_on:
      - postgres
    command: /start.sh
    networks:
      - code_gen

  postgres:
    image: "postgres:15-bullseye"
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.envs/.local/.postgres
    networks:
      - code_gen

  nginx:
    restart: always
    depends_on:
      - app
    build:
      context: ./Docker/local/nginx
      dockerfile: Dockerfile
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "8080:80"
    networks:
      - code_gen

volumes:
  local_postgres_data: {}
  static_volume:
  media_volume:

networks:
  code_gen:
    driver: bridge
